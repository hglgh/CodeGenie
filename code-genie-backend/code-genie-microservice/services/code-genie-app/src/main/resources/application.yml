spring:
  application:
    name: code-genie-app
  threads:
    virtual:
      enabled: true
  # session
  session:
    redis:
      namespace: spring:session
    # 30 days expire
    #PT2H 表示2小时
    #P30D 表示30天
    #PT30M 表示30分钟
    #PT30S 表示30秒
    timeout: P30D   # 30 * 24 * 60 * 60 = 2592000 （30天）
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${mysql.url}
    username: ${mysql.username}
    password: ${mysql.password}
  # redis
  data:
    redis:
      host: ${redis.host}
      port: ${redis.port}
      database: 0
      password:
  profiles:
    active: local
server:
  port: 8125
  servlet:
    context-path: /api
    # 30 days expire
    session:
      cookie:
        max-age: P30D
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.hgl.codegenie.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

# Dubbo
dubbo:
  registry:
    address: nacos://192.168.6.128:8848
    register-mode: instance
  protocol:
    name: tri
    port: 50053
  consumer:
    timeout: 120000
  provider:
    timeout: 120000

# CodeGenie 自定义配置
codegenie:
  security:
    password-salt: ${CODEGENIE_PASSWORD_SALT:hgl}
    default-password: ${CODEGENIE_DEFAULT_PASSWORD:12345678}
  deploy:
    code-output-root-dir: ${CODEGENIE_CODE_OUTPUT_DIR:}
    code-deploy-root-dir: ${CODEGENIE_CODE_DEPLOY_DIR:}
    screenshot-root-dir: ${CODEGENIE_SCREENSHOT_DIR:}
    deploy-host: ${CODEGENIE_DEPLOY_HOST:http://localhost}
    deploy-key-length: 6
  ai:
    chat-history-load-count: 20
    chat-memory-max-messages: 100
